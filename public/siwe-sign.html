<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fapex — Ký SIWE (MetaMask)</title>
  <style>
    :root { font-family: system-ui, sans-serif; line-height: 1.5; color: #1a1a1a; }
    body { max-width: 42rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; font-size: 0.875rem; }
    input, textarea { width: 100%; box-sizing: border-box; margin-top: 0.25rem; padding: 0.5rem; font: inherit; }
    textarea { min-height: 8rem; font-family: ui-monospace, monospace; font-size: 0.8rem; }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    button { padding: 0.5rem 1rem; font: inherit; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; font-size: 0.9rem; }
    #status.error { background: #fde8e8; color: #9b1c1c; border: 1px solid #f5c6c6; }
    #status.ok { background: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; }
    #status.info { background: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
    .hint { font-size: 0.85rem; color: #555; margin-top: 0.25rem; font-weight: normal; }
    code { font-size: 0.85em; }
  </style>
</head>
<body>
  <h1>Ký SIWE cho Fapex (MetaMask)</h1>
  <p>
  Trang này phải mở qua <strong>http://127.0.0.1:5000</strong> (backend đang chạy).
  MetaMask <strong>không</strong> hoạt động với <code>file://</code>.
  </p>

  <div id="status" class="info" role="status">Đang kiểm tra MetaMask…</div>

  <label>Địa chỉ ví
    <input id="walletAddress" type="text" placeholder="0x…" autocomplete="off">
    <span class="hint">Phải trùng ví đang kết nối MetaMask</span>
  </label>

  <label>Nonce
    <input id="nonce" type="text" placeholder="Lấy từ POST /api/auth/nonce" autocomplete="off">
  </label>

  <label>Domain (SIWE_DOMAIN)
    <input id="domain" type="text" value="localhost">
    <span class="hint">Khớp <code>SIWE_DOMAIN</code> trong backend <code>.env</code></span>
  </label>

  <label>URI (APP_URL)
    <input id="uri" type="text" value="http://localhost:3000">
    <span class="hint">Khớp <code>APP_URL</code> trong backend <code>.env</code></span>
  </label>

  <label>Chain ID
    <input id="chainId" type="number" value="11155111">
  </label>

  <div class="row">
    <button type="button" id="btnConnect">Kết nối MetaMask</button>
    <button type="button" id="btnNonce">Lấy nonce từ API</button>
    <button type="button" id="btnSign">Ký với MetaMask</button>
  </div>

  <label>SIWE message (dán vào <code>@siweMessage</code> / Postman)
    <textarea id="outMessage" readonly placeholder="Message sẽ hiện sau khi ký…"></textarea>
  </label>

  <label>Chữ ký (dán vào <code>@siweSignature</code> / Postman)
    <textarea id="outSignature" readonly placeholder="0x…"></textarea>
  </label>

  <script type="module">
    import { SiweMessage } from 'https://esm.sh/siwe@3';

    const STATEMENT = 'Sign in to Fapex';
    const API_BASE = window.location.origin;

    const els = {
      status: document.getElementById('status'),
      walletAddress: document.getElementById('walletAddress'),
      nonce: document.getElementById('nonce'),
      domain: document.getElementById('domain'),
      uri: document.getElementById('uri'),
      chainId: document.getElementById('chainId'),
      outMessage: document.getElementById('outMessage'),
      outSignature: document.getElementById('outSignature'),
      btnConnect: document.getElementById('btnConnect'),
      btnNonce: document.getElementById('btnNonce'),
      btnSign: document.getElementById('btnSign'),
    };

    function setStatus(kind, text) {
      els.status.className = kind;
      els.status.textContent = text;
    }

    function getEthereum() {
      return window.ethereum;
    }

    function applyQueryParams() {
      const params = new URLSearchParams(window.location.search);
      for (const key of ['walletAddress', 'nonce', 'domain', 'uri', 'chainId']) {
        const value = params.get(key);
        if (value) els[key].value = value;
      }
    }

    function checkEthereum() {
      if (!getEthereum()) {
        setStatus(
          'error',
          'window.ethereum không có — MetaMask không inject trên file://. Mở http://127.0.0.1:5000/siwe-sign.html sau khi chạy npm start trong backend.'
        );
        els.btnConnect.disabled = true;
        els.btnSign.disabled = true;
        return false;
      }
      setStatus('ok', 'MetaMask sẵn sàng. Kết nối ví hoặc lấy nonce từ API.');
      return true;
    }

    async function connectWallet() {
      const ethereum = getEthereum();
      if (!ethereum) return;
      try {
        const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
        if (accounts?.[0]) {
          els.walletAddress.value = accounts[0];
          setStatus('ok', `Đã kết nối: ${accounts[0]}`);
        }
      } catch (err) {
        setStatus('error', err.message || 'Người dùng từ chối kết nối ví.');
      }
    }

    async function fetchNonce() {
      const walletAddress = els.walletAddress.value.trim();
      if (!walletAddress) {
        setStatus('error', 'Nhập địa chỉ ví trước khi lấy nonce.');
        return;
      }
      els.btnNonce.disabled = true;
      setStatus('info', 'Đang gọi POST /api/auth/nonce…');
      try {
        const res = await fetch(`${API_BASE}/api/auth/nonce`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ walletAddress }),
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          throw new Error(data.error || `HTTP ${res.status}`);
        }
        els.nonce.value = data.nonce;
        if (data.domain) els.domain.value = data.domain;
        if (data.chainId) els.chainId.value = String(data.chainId);
        if (data.walletAddress) els.walletAddress.value = data.walletAddress;
        setStatus('ok', 'Đã lấy nonce. Bấm "Ký với MetaMask".');
      } catch (err) {
        setStatus('error', `Lấy nonce thất bại: ${err.message}. Backend + MongoDB đang chạy?`);
      } finally {
        els.btnNonce.disabled = false;
      }
    }

    function buildMessage() {
      const walletAddress = els.walletAddress.value.trim();
      const nonce = els.nonce.value.trim();
      const domain = els.domain.value.trim();
      const uri = els.uri.value.trim();
      const chainId = Number(els.chainId.value);

      if (!walletAddress || !nonce || !domain || !uri || !chainId) {
        throw new Error('Điền đủ ví, nonce, domain, uri và chainId.');
      }

      return new SiweMessage({
        domain,
        address: walletAddress,
        statement: STATEMENT,
        uri,
        version: '1',
        chainId,
        nonce,
      });
    }

    async function signSiwe() {
      const ethereum = getEthereum();
      if (!ethereum) {
        setStatus('error', 'MetaMask không khả dụng. Dùng http://127.0.0.1:5000/siwe-sign.html, không phải file://.');
        return;
      }

      let prepared;
      try {
        prepared = buildMessage().prepareMessage();
      } catch (err) {
        setStatus('error', err.message);
        return;
      }

      const walletAddress = els.walletAddress.value.trim();
      els.btnSign.disabled = true;
      setStatus('info', 'Chờ xác nhận trong MetaMask…');

      try {
        const signature = await ethereum.request({
          method: 'personal_sign',
          params: [prepared, walletAddress],
        });
        els.outMessage.value = prepared;
        els.outSignature.value = signature;
        setStatus('ok', 'Đã ký. Copy message + signature sang api-tests.http hoặc Postman.');
      } catch (err) {
        setStatus('error', err.message || 'Ký thất bại hoặc bị hủy.');
      } finally {
        els.btnSign.disabled = false;
      }
    }

    els.btnConnect.addEventListener('click', connectWallet);
    els.btnNonce.addEventListener('click', fetchNonce);
    els.btnSign.addEventListener('click', signSiwe);

    applyQueryParams();
    checkEthereum();
  </script>
</body>
</html>
